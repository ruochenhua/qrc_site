<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>骑行网红模拟器 - MVP</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game">
  <header>
    <h1>骑行网红模拟器</h1>
    <div class="meta"><span id="day-num">0</span>天 | <span id="time-num">09:00</span> | <span id="km-num">0</span>km</div>
  </header>
  <div id="phase-indicator">选择你的开局人设</div>
  <div id="poi-bar" style="display:none">
    <div class="poi-info">
      <span id="current-poi">🛣️ 路段中</span>
      <span id="next-poi-dist" class="poi-dist">📍 距离下一个兴趣点：--</span>
      <button id="map-btn">🗺️ 地图</button>
    </div>
  </div>
  <div id="weather-bar" style="display:none">
    <div class="weather-info">
      <span id="weather-icon">☀️</span>
      <span id="weather-name">晴好</span>
      <span class="weather-sep">|</span>
      <span id="weather-stamina">体力×1.0</span>
      <span class="weather-sep">|</span>
      <span id="weather-material">素材×1.0</span>
    </div>
  </div>
  <div id="stats" style="display:none">
    <div class="stat"><label>体力</label><div class="val" id="con-val">0</div><div class="bar"><div id="con-bar" style="width:0%;background:var(--success)"></div></div></div>
    <div class="stat"><label>精力</label><div class="val" id="energy-val">0</div><div class="bar"><div id="energy-bar" style="width:0%;background:var(--accent)"></div></div></div>
    <div class="stat"><label>资金</label><div class="val" id="cny-val">0</div><div class="bar"><div id="cny-bar" style="width:0%;background:var(--warn)"></div></div></div>
    <div class="stat"><label>精神</label><div class="val" id="san-val">0</div><div class="bar"><div id="san-bar" style="width:0%;background:#aa66ff"></div></div></div>
    <div class="stat"><label>黑红</label><div class="val" id="sin-val">0</div><div class="bar"><div id="sin-bar" style="width:0%;background:var(--danger)"></div></div></div>
    <div class="stat"><label>粉丝</label><div class="val" id="fans-val">0</div><div class="bar"><div id="fans-bar" style="width:0%;background:var(--accent2)"></div></div></div>
  </div>
  <div id="main"><div id="log"></div></div>
  <div id="actions"></div>
  <div id="file-protocol-warning" style="display:none;padding:20px;text-align:center">
    <div style="font-size:32px;margin-bottom:12px">⚠️</div>
    <div style="color:var(--danger);font-size:16px;margin-bottom:12px">无法通过 file:// 协议加载 ES Module</div>
    <div style="color:var(--muted);font-size:13px;line-height:1.8">
      请使用本地服务器打开本页面：<br>
      <code style="background:#0d0d14;padding:4px 8px;border-radius:4px">npx serve</code>
      或
      <code style="background:#0d0d14;padding:4px 8px;border-radius:4px">python -m http.server 8000</code>
    </div>
  </div>

  <div id="map-modal" class="modal-hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>🗺️ 全程路线地图</h3>
        <button class="modal-close">✕</button>
      </div>
      <div id="map-body" class="map-body"></div>
      <div class="map-legend">
        <span>🏙️ 城市</span> <span>🏔️ 野外景点</span> <span>✅ 已到达</span> <span>📍 当前位置</span> <span>⬜ 未到达</span>
      </div>
    </div>
  </div>
</div>

<script>
  if (location.protocol === 'file:') {
    document.getElementById('file-protocol-warning').style.display = 'block';
  }
</script>
<script type="module" src="js/game.js"></script>
</body>
</html>
