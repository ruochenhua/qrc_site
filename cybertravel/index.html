<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>骑行网红模拟器 - MVP</title>
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --accent: #00f0ff;
    --accent2: #ff0055;
    --text: #e0e0e0;
    --muted: #888;
    --border: #222;
    --danger: #ff3333;
    --success: #00ff88;
    --warn: #ffaa00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 12px;
  }
  #game {
    width: 100%;
    max-width: 520px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 90vh;
  }
  header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 16px;
    color: var(--accent);
    letter-spacing: 2px;
  }
  header .meta {
    font-size: 13px;
    color: var(--muted);
  }
  #stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .stat {
    background: #0d0d14;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    text-align: center;
  }
  .stat label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .stat .val {
    font-size: 16px;
    font-weight: bold;
  }
  .stat .bar {
    height: 4px;
    background: #222;
    border-radius: 2px;
    margin-top: 4px;
    overflow: hidden;
  }
  .stat .bar > div {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }
  #phase-indicator {
    padding: 8px 16px;
    font-size: 12px;
    color: var(--accent2);
    border-bottom: 1px solid var(--border);
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  #main {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    min-height: 0;
  }
  #log {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .log-item {
    padding: 10px 12px;
    background: #0d0d14;
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-size: 14px;
    line-height: 1.6;
    animation: fadeIn 0.3s ease;
  }
  .log-item.danger { border-left-color: var(--danger); }
  .log-item.success { border-left-color: var(--success); }
  .log-item.warn { border-left-color: var(--warn); }
  .log-item.muted { border-left-color: var(--muted); color: var(--muted); }
  .log-item.info { border-left-color: var(--accent); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  #actions {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
    max-height: 200px;
    overflow-y: auto;
  }
  button {
    padding: 12px 16px;
    border: 1px solid var(--border);
    background: #1a1a24;
    color: var(--text);
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
    text-align: left;
    font-family: inherit;
  }
  button:hover {
    border-color: var(--accent);
    background: #1e1e2e;
  }
  button.primary {
    border-color: var(--accent);
    color: var(--accent);
  }
  button.danger {
    border-color: var(--danger);
    color: var(--danger);
  }
  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .identity-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .identity-card:hover {
    border-color: var(--accent);
    background: #151520;
  }
  .identity-card h3 {
    font-size: 15px;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .identity-card .attrs {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .identity-card .desc {
    font-size: 13px;
    line-height: 1.5;
  }
  .platform-tag {
    display: inline-block;
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 12px;
    background: #1a1a24;
    border: 1px solid var(--border);
    margin-right: 6px;
    margin-top: 4px;
  }
  .time-bar {
    width: 100%;
    height: 6px;
    background: #222;
    border-radius: 3px;
    margin: 8px 0;
    overflow: hidden;
  }
  .time-bar > div {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.5s;
  }
  .ending-screen {
    text-align: center;
    padding: 40px 20px;
  }
  .ending-screen h2 {
    font-size: 24px;
    margin-bottom: 16px;
  }
  .ending-screen p {
    font-size: 15px;
    line-height: 1.8;
    color: var(--muted);
    margin-bottom: 24px;
  }
  .ending-screen.good h2 { color: var(--success); }
  .ending-screen.bad h2 { color: var(--danger); }
  .ending-screen.neutral h2 { color: var(--warn); }

  /* ===== 兴趣点系统样式 ===== */
  #poi-bar {
    padding: 8px 16px;
    background: #0d0d14;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .poi-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
  }
  .poi-dist {
    color: var(--accent);
    cursor: pointer;
  }
  .poi-dist:hover {
    text-decoration: underline;
  }
  #map-btn {
    padding: 4px 10px;
    font-size: 12px;
    background: #1a1a24;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    cursor: pointer;
  }
  #map-btn:hover {
    border-color: var(--accent);
  }

  /* 地图弹窗 */
  #map-modal {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-hidden { display: none !important; }
  .modal-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.7);
  }
  .modal-content {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 480px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .modal-header h3 {
    font-size: 15px;
    color: var(--text);
    margin: 0;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    padding: 0;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
  }
  .modal-close:hover {
    background: rgba(255,255,255,0.1);
    color: var(--text);
  }
  .map-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    font-size: 13px;
  }
  .map-node {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    margin-bottom: 4px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .map-node:hover {
    background: rgba(255,255,255,0.05);
  }
  .map-node.current {
    background: rgba(0, 240, 255, 0.1);
    border: 1px solid var(--accent);
  }
  .map-node.visited {
    opacity: 0.7;
  }
  .map-node-name {
    flex: 1;
    color: var(--text);
  }
  .map-node-km {
    color: var(--muted);
    font-size: 11px;
  }
  .map-connector {
    padding-left: 28px;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .map-legend {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .map-detail {
    padding: 10px;
    background: #0d0d14;
    border-radius: 8px;
    margin-top: 6px;
    font-size: 12px;
    color: var(--muted);
  }
  .map-detail-title {
    color: var(--accent);
    font-weight: bold;
    margin-bottom: 4px;
  }

  /* 城市菜单 */
  .city-menu-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 12px;
  }
  .city-menu-tab {
    flex: 1;
    padding: 8px;
    font-size: 13px;
    text-align: center;
    background: #0d0d14;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    color: var(--muted);
  }
  .city-menu-tab.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,240,255,0.05);
  }
  .shop-item, .hotel-item, .attraction-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    background: #0d0d14;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
  }
  .shop-item-info, .hotel-info {
    flex: 1;
  }
  .shop-item-name, .hotel-name, .attraction-name {
    font-size: 14px;
    color: var(--text);
    margin-bottom: 2px;
  }
  .shop-item-desc, .hotel-desc, .attraction-desc {
    font-size: 11px;
    color: var(--muted);
  }
  .shop-item-price, .hotel-price {
    font-size: 13px;
    color: var(--warn);
    white-space: nowrap;
  }
  .attraction-time {
    font-size: 11px;
    color: var(--accent);
    white-space: nowrap;
  }
</style>
</head>

<div id="game">
  <header>
    <h1>骑行网红模拟器</h1>
    <div class="meta"><span id="day-num">0</span>天 | <span id="time-num">09:00</span> | <span id="km-num">0</span>km</div>
  </header>
  <div id="phase-indicator">选择你的开局人设</div>

    </div>

    <div class="stat"><label>精神</label><div class="val" id="san-val">0</div><div class="bar"><div id="san-bar" style="width:0%;background:#aa66ff"></div></div></div>
    <div class="stat"><label>黑红</label><div class="val" id="sin-val">0</div><div class="bar"><div id="sin-bar" style="width:0%;background:var(--danger)"></div></div></div>

  </div>
  <div id="main"><div id="log"></div></div>
  <div id="actions"></div>

  <!-- 全程地图弹窗 -->
  <div id="map-modal" class="modal-hidden">
    <div class="modal-overlay" onclick="game.toggleMap()"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>🗺️ 全程路线地图</h3>
        <button class="modal-close" onclick="game.toggleMap()">✕</button>
      </div>
      <div id="map-body" class="map-body"></div>
      <div class="map-legend">
        <span>🏙️ 城市</span> <span>🏔️ 野外景点</span> <span>✅ 已到达</span> <span>📍 当前位置</span> <span>⬜ 未到达</span>
      </div>
    </div>
  </div>
</div>

<script>
// ===================== T01: 游戏状态机 =====================
class GameState {
  constructor() {
    this.reset();
  }

  reset() {
    this.day = 1;
    this.time = 9;
    this.km = 0;
    this.nodeIndex = 0;

    this.stats = { con: 35, int: 85, art: 40, hrt: 30, luk: 50 };
    this.energy = 80;
    this.maxEnergy = 100;
    this.san = 100;
    this.cny = 25000;
    this.sin = 0;

    this.fans = { bilibili: 500, douyin: 0, xiaohongshu: 0 };
    this.materials = 0;

    this.phase = 'SELECT';
    this.flags = new Set();
    this.gameOver = false;
    this.ending = null;

    // 负重系统
    this.inventory = [];
    this.weight = 0;
    this.maxWeight = 15;

    // 兴趣点系统
    this.visitedPois = new Set();
    this.accommodationChoice = null;
  }

  get totalFans() {
    return this.fans.bilibili + this.fans.douyin + this.fans.xiaohongshu;
  }

  get currentNode() {
    return ROUTE[this.nodeIndex] || null;
  }

  modifyStat(key, delta) {
    if (key in this.stats) {
      this.stats[key] = clamp(this.stats[key] + delta, 0, 100);
    } else if (key === 'energy') {
      this.energy = clamp(this.energy + delta, 0, this.maxEnergy);
    } else if (key === 'san') {
      this.san = clamp(this.san + delta, 0, 100);
    } else if (key === 'cny') {
      this.cny = Math.max(0, this.cny + delta);
    } else if (key === 'sin') {
      this.sin = clamp(this.sin + delta, 0, 100);
    } else if (key === 'materials') {
      this.materials = Math.max(0, this.materials + delta);
    }
  }

  // 负重系统
  addItem(itemId, count = 1) {
    const item = ITEMS[itemId];
    if (!item) return false;
    const newWeight = this.weight + item.weight * count;
    if (newWeight > this.maxWeight * 1.5) return false; // 最大超载50%
    this.inventory.push({ id: itemId, count });
    this.weight = newWeight;
    return true;
  }

  checkOverload() {
    if (this.weight > this.maxWeight) {
      const overload = this.weight - this.maxWeight;
      this.stats.con -= overload * 2;
      return { overloaded: true, penalty: overload * 2 };
    }
    return { overloaded: false };
  }
}

  if (Math.random() >= 0.2) return null;
  const totalWeight = CAMP_EVENTS.reduce((sum, e) => sum + (e.weight || 1), 0);
  let roll = Math.random() * totalWeight;
  for (const event of CAMP_EVENTS) {
    roll -= (event.weight || 1);
    if (roll <= 0) return event;
  }
  return null;
}

class SinSystem {
  static SOURCES = {
    fakeScript: { name: '编造剧本', signal: '评论区出现质疑声...' },
    fakeAd: { name: '虚假宣传', signal: '粉丝增长突然放缓...' },

  };

  // 添加Sin并可能发送弱信号
  static addSin(state, amount, sourceId) {
    state.sin = clamp(state.sin + amount, 0, 100);
    const source = this.SOURCES[sourceId];
    if (source && Math.random() < 0.4) {
      return { triggered: true, signal: source.signal, source: source.name };
    }
    return { triggered: false };
  }

  // 检查Sin相关结局
  static checkSinEnding(state) {
    if (state.sin >= 80) {
      return 'blackred';
    }
    return null;
  }

  // 获取当前Sin状态的描述
  static getSinDescription(sin) {
    if (sin >= 80) return { level: 'danger', text: '⚠️ 你的黑红指数极高，随时可能被全网封杀' };
    if (sin >= 50) return { level: 'warn', text: '⚡ 争议越来越大，评论区开始失控' };

    if (sin >= 10) return { level: 'muted', text: '🌫️ 隐约感觉有些不对劲...' };
    return null;
  }
}

// ===================== T03: 时间驱动器 =====================
class TimeEngine {
  constructor(state) {
    this.state = state;
  }

  advance(hours) {
    this.state.time += hours;
    if (this.state.time >= 24) {
      this.endDay();
    }
  }

  endDay() {
    this.state.day++;
    this.state.time = 9;
    this.state.phase = 'MORNING';
    // 精力恢复（不会补满）
    const recovery = 20 + this.state.stats.con * 0.3;
    this.state.energy = Math.min(this.state.maxEnergy, this.state.energy + recovery);
    // 清空素材
    this.state.materials = 0;
    // 超载惩罚
    const overload = this.state.checkOverload();
    if (overload.overloaded) {
      // 惩罚在checkOverload中已应用
    }
  }

  getPhase() {
    const t = this.state.time;
    if (t < 9) return 'MORNING';
    if (t < 12) return 'DAY_MORNING';
    if (t < 14) return 'DAY_NOON';
    if (t < 18) return 'DAY_AFTERNOON';
    if (t < 19) return 'EVENING';
    return 'NIGHT';
  }

  formatTime() {
    const h = Math.floor(this.state.time);
    const m = Math.floor((this.state.time - h) * 60);
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  }
}

// ===================== T04: 事件引擎 =====================
class EventEngine {
  rollEvent(phase) {
    const candidates = EVENTS.filter(e => e.phase === phase);
    if (candidates.length === 0) return null;
    const totalWeight = candidates.reduce((sum, e) => sum + (e.weight || 1), 0);
    let roll = Math.random() * totalWeight;
    for (const event of candidates) {
      roll -= (event.weight || 1);
      if (roll <= 0) return event;
    }
    return null;
  }

  executeChoice(choice, state) {
    if (!choice || !choice.effects) return;
    for (const eff of choice.effects) {
      if (eff.key === 'time') {
        state.time += eff.delta;
      } else if (eff.key === 'km') {
        state.km += eff.delta;
      } else if (eff.key === 'node') {
        state.nodeIndex = Math.max(0, state.nodeIndex + eff.delta);
        const node = ROUTE[state.nodeIndex];
        if (node) state.km = node.km;
      } else if (eff.key.startsWith('fans_')) {
        const platform = eff.key.replace('fans_', '');
        state.fans[platform] = (state.fans[platform] || 0) + eff.delta;
      } else if (eff.key === 'msg') {
        // msg效果只用于显示，不修改状态
        if (eff.msg && window.game && game.renderer) {
          game.renderer.log(eff.msg, 'info');
        }
      } else if (eff.key === 'sin') {
        // Sin系统：添加sin并可能触发弱信号
        const result = SinSystem.addSin(state, eff.delta, 'fakeScript');
        if (result.triggered && window.game && game.renderer) {
          game.renderer.log(`💀 ${result.signal}`, 'warn');
        }
      } else if (eff.key === 'int_check') {
        // 智力判定
        const roll = Math.random();
        const success = roll < (state.stats.int / 100) * eff.delta;
        if (window.game && game.renderer) {
          game.renderer.log(`智力判定：${success ? '成功！' : '失败...'}`, success ? 'success' : 'warn');
        }
        if (!success) {
          state.modifyStat('con', -10);
          state.time += 1;
        }
      } else {
        state.modifyStat(eff.key, eff.delta);
      }
    }
  }
}

// ===================== T05: 内容产出系统 =====================
class ContentSystem {
  // 自由组合内容产出
  static produceCombo(state, types) {
    let totalTime = 0;
    let totalEnergy = 0;
    const gains = { bilibili: 0, douyin: 0, xiaohongshu: 0 };

    for (const type of types) {
      const config = CONTENT_TYPES[type];
      totalTime += config.time;
      totalEnergy += config.energy;

      const typeGains = PlatformAlgorithm.calculate(type, state);
      for (const [platform, amount] of Object.entries(typeGains)) {
        gains[platform] += amount;
      }
    }

    state.time += totalTime;
    state.energy -= totalEnergy;

    return { gains, totalTime, totalEnergy };
  }
}

// ===================== T06: 平台算法（含变现解锁） =====================
class PlatformAlgorithm {
  static calculate(type, state) {
    const config = CONTENT_TYPES[type];
    const baseQuality = 50 + state.stats[config.stat];
    const materialBonus = Math.min(state.materials * 2, 50);
    const quality = baseQuality + materialBonus;

    const result = {};
    for (const platform of ['bilibili', 'douyin', 'xiaohongshu']) {
      const mult = PLATFORM_MULTIPLIERS[type][platform];
      const statBonus = state.stats[config.stat] * 0.5;
      const rawGain = Math.floor((quality + statBonus) * mult * 0.1);

      // 变现解锁加成
      const fans = state.fans[platform];
      let monetizationBonus = 1.0;
      if (fans >= 100000) monetizationBonus = 2.0;
      else if (fans >= 10000) monetizationBonus = 1.5;
      else if (fans >= 1000) monetizationBonus = 1.2;

      result[platform] = Math.floor(rawGain * monetizationBonus);
    }
    return result;
  }

  // 检查是否解锁高门槛变现事件
  static checkMonetizationEvents(state) {
    const events = [];
    if (state.fans.bilibili >= 10000 && !state.flags.has('bilibili_partner')) {
      events.push({
        platform: 'bilibili',
        name: '创作激励开通',
        desc: '你的B站粉丝突破1万，创作激励已开通！',
      });
    }
    if (state.fans.douyin >= 5000 && !state.flags.has('douyin_live')) {
      events.push({
        platform: 'douyin',
        name: '直播带货资格',
        desc: '你的抖音粉丝突破5000，获得直播带货资格！',
      });
    }
    return events;
  }
}

                <div class="attraction-name">${attr.name}</div>
                <div class="attraction-desc">${attr.desc}</div>
              </div>
              <div class="attraction-time">${attr.time}h</div>
              <button ${!hasTime ? 'disabled' : ''} onclick="game.visitAttraction('${attr.name}')">参观</button>
            </div>`;
        });
      } else if (currentTab === '离开') {
        contentHtml = '<div style="text-align:center;padding:20px;color:var(--muted);">准备继续上路？</div>';
      }

      const tabButtons = tabs.map(t => `
        <div class="city-menu-tab ${t === currentTab ? 'active' : ''}" onclick="game.switchCityTab('${t}')">${t}</div>
      `).join('');

      this.els.log.innerHTML = `
        <div class="city-menu-tabs">${tabButtons}</div>
        <div>${contentHtml}</div>
      `;

      // 离开按钮单独放在 actions 区
      if (currentTab === '离开') {
        this.showChoices([
          { text: '🚴 离开城市，继续前进', className: 'primary', onClick: () => onAction('leave') },
        ]);
      } else {
        this.showChoices([
          { text: '⬅️ 返回', onClick: () => { game._cityMenuTab = '离开'; refresh(); } },
        ]);
      }
    };

    // 把 refresh 挂在 game 上供 tab 切换使用
    game._cityMenuRefresh = refresh;
    game._currentCityNode = node;
    refresh();
  }

  renderWildPoi(node, onAction) {
    this.clearLog();
    this.setPhase(`🏔️ ${node.name}`);
    this.log(node.desc, 'info');

    const attr = node.attractions && node.attractions[0];
    if (attr) {
      this.log(`你可以在这里停留拍摄：${attr.name}`, 'info');
      this.showChoices([
        { text: `📷 ${attr.name}（${attr.time}h | 素材+${attr.effects.find(e=>e.key==='materials')?.delta || '?'} 精神+${attr.effects.find(e=>e.key==='san')?.delta || '?'})`, className: 'primary', onClick: () => onAction('shoot') },
        { text: '🚴 路过，不停留', onClick: () => onAction('pass') },
      ]);
    } else {
      this.log('这里风景不错，但没有什么特别的拍摄点。', 'muted');
      this.showChoices([
        { text: '🚴 继续前进', className: 'primary', onClick: () => onAction('pass') },
      ]);
    }
  }

  updateStats(state) {
    this.els.day.textContent = state.day;
    this.els.time.textContent = game.timeEngine.formatTime();
    this.els.km.textContent = Math.floor(state.km);

    this.els.conVal.textContent = Math.round(state.stats.con);
    this.els.energyVal.textContent = Math.round(state.energy);
    this.els.cnyVal.textContent = '¥' + Math.round(state.cny);
    this.els.sanVal.textContent = Math.round(state.san);
    this.els.sinVal.textContent = Math.round(state.sin);
    this.els.fansVal.textContent = state.totalFans > 10000 ? (state.totalFans / 10000).toFixed(1) + 'w' : state.totalFans;

    this.els.conBar.style.width = clamp(state.stats.con, 0, 100) + '%';
    this.els.energyBar.style.width = clamp((state.energy / state.maxEnergy) * 100, 0, 100) + '%';
    const maxMoney = Math.max(state.cny, 25000);
    this.els.cnyBar.style.width = clamp((state.cny / maxMoney) * 100, 0, 100) + '%';
    this.els.sanBar.style.width = clamp(state.san, 0, 100) + '%';
    this.els.sinBar.style.width = clamp(state.sin, 0, 100) + '%';
    const maxFans = Math.max(state.totalFans, 100000);
    this.els.fansBar.style.width = clamp((state.totalFans / maxFans) * 100, 0, 100) + '%';

    this.updatePoiBar(state);
  }

  setPhase(label) {
    this.els.phase.textContent = label;
  }

  log(text, type = 'info') {
    const div = document.createElement('div');
    div.className = 'log-item ' + type;
    div.textContent = text;
    this.els.log.appendChild(div);
    this.els.log.parentElement.scrollTop = this.els.log.parentElement.scrollHeight;
  }

  clearLog() {
    this.els.log.innerHTML = '';
  }

  showChoices(choices) {
    this.els.actions.innerHTML = '';
    for (const c of choices) {
      const btn = document.createElement('button');
      btn.textContent = c.text;
      if (c.className) btn.className = c.className;
      if (c.disabled) btn.disabled = true;
      btn.onclick = c.onClick;
      this.els.actions.appendChild(btn);
    }
  }

  showEnding(ending) {
    this.clearLog();
    const div = document.createElement('div');
    div.className = 'ending-screen ' + ending.type;

    // 根据结局类型设置不同的视觉风格
    const typeEmoji = ending.type === 'good' ? '🏆' : ending.type === 'bad' ? '💀' : '⚖️';
    const typeColor = ending.type === 'good' ? 'var(--success)' : ending.type === 'bad' ? 'var(--danger)' : 'var(--warn)';

    div.innerHTML = `
      <div style="font-size:48px;margin-bottom:16px">${typeEmoji}</div>
      <h2 style="color:${typeColor}">${ending.title}</h2>
      <p>${ending.desc}</p>
      <div style="background:#0d0d14;border:1px solid var(--border);border-radius:8px;padding:12px;margin:16px 0;text-align:left">
        <div style="font-size:12px;color:var(--muted);margin-bottom:8px">旅程统计</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px">
          <div>📅 天数：<span style="color:var(--text)">${game.state.day}</span></div>
          <div>🚴 里程：<span style="color:var(--text)">${Math.floor(game.state.km)}km</span></div>
          <div>👥 粉丝：<span style="color:var(--text)">${game.state.totalFans}</span></div>
          <div>💰 资金：<span style="color:var(--text)">¥${Math.round(game.state.cny)}</span></div>
          <div>😈 黑红值：<span style="color:${game.state.sin > 50 ? 'var(--danger)' : 'var(--muted)'}">${game.state.sin}</span></div>
          <div>📍 终点：<span style="color:var(--text)">${game.state.currentNode ? game.state.currentNode.name : '未知'}</span></div>
        </div>
      </div>
      <p style="font-size:12px;color:var(--muted)">${ending.type === 'good' ? '你找到了属于自己的路。' : ending.type === 'bad' ? '也许下一次，会有不同的选择。' : '这就是旅程的意义。'}</p>
    `;
    this.els.log.appendChild(div);

    this.els.actions.innerHTML = '';
    const btn = document.createElement('button');
    btn.textContent = '🔄 重新开始';
    btn.className = 'primary';
    btn.onclick = () => game.restart();
    this.els.actions.appendChild(btn);
  }
}

// ===================== T08: 存档系统 =====================
class SaveSystem {
  static KEY = 'cybertravel_save_v1';

  static save(state) {
    const data = {
      schemaVersion: 3,
      routeType: ROUTE === ROUTES.short ? 'short' : 'long',
      day: state.day,
      time: state.time,
      km: state.km,
      nodeIndex: state.nodeIndex,
      stats: state.stats,
      energy: state.energy,
      maxEnergy: state.maxEnergy,
      san: state.san,
      cny: state.cny,
      sin: state.sin,
      fans: state.fans,
      materials: state.materials,
      inventory: state.inventory,
      weight: state.weight,
      maxWeight: state.maxWeight,
      phase: state.phase,
      flags: Array.from(state.flags),
      visitedPois: Array.from(state.visitedPois || []),
      accommodationChoice: state.accommodationChoice,
      gameOver: state.gameOver,
      ending: state.ending,
      timestamp: Date.now(),
    };
    localStorage.setItem(this.KEY, JSON.stringify(data));
  }

  static load() {
    const raw = localStorage.getItem(this.KEY);
    if (!raw) return null;
    try {
      const data = JSON.parse(raw);
      // 版本迁移：v1 -> v2
      if (data.schemaVersion === 1) {
        data.sin = data.sin || 0;
        data.schemaVersion = 2;
      }
      // 版本迁移：v2 -> v3（兴趣点系统）
      if (data.schemaVersion === 2) {
        data.visitedPois = data.visitedPois || [];
        data.accommodationChoice = data.accommodationChoice || null;
        data.schemaVersion = 3;
      }
      return data;
    } catch {
      return null;
    }
  }

  static exists() {
    return localStorage.getItem(this.KEY) !== null;
  }

  static clear() {
    localStorage.removeItem(this.KEY);
  }
}

// ===================== 兴趣点工具函数 =====================
function getNextPoi(state) {
  for (let i = state.nodeIndex + 1; i < ROUTE.length; i++) {
    if (ROUTE[i].type !== 'road') {
      return ROUTE[i];
    }
  }
  return null;
}

function getDistanceToNextPoi(state) {
  const next = getNextPoi(state);
  if (!next) return 0;
  return next.km - state.km;
}

function formatDistance(km) {
  if (km >= 1000) return (km / 1000).toFixed(1) + 'km';
  return Math.round(km) + 'km';
}

// ===================== 工具函数 =====================
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

// ===================== 游戏主控 =====================
class Game {
  constructor() {
    this.state = new GameState();
    this.timeEngine = new TimeEngine(this.state);
    this.eventEngine = new EventEngine();
    this.renderer = new Renderer();
  }

  restart() {
    this.state.reset();
    SaveSystem.clear();
    this.showStartScreen();
  }

  showStartScreen() {
    this.renderer.setPhase('选择你的开局人设');
    this.renderer.clearLog();
    this.renderer.els.stats.style.display = 'none';

    this.renderer.log('欢迎来到骑行网红模拟器！', 'success');
    this.renderer.log('选择路线：', 'info');

    // 路线选择
    const routeChoices = [
      { id: 'short', name: '短线（新手模式）', desc: '成都→康定，4个节点，约10-15分钟', nodes: 4 },
      { id: 'long', name: '长线（标准模式）', desc: '成都→拉萨，8个节点，约30-60分钟', nodes: 8 },
    ];

    for (const rc of routeChoices) {
      const card = document.createElement('div');
      card.className = 'identity-card';
      card.innerHTML = `
        <h3>${rc.name}</h3>
        <div class="desc">${rc.desc}</div>
      `;
      card.onclick = () => {
        ROUTE = ROUTES[rc.id];
        this.renderer.log(`选择了${rc.name}`, 'success');
        this.showIdentitySelect();
      };
      this.renderer.els.log.appendChild(card);
    }

    this.renderer.showChoices([]);
  }

  showIdentitySelect() {
    this.renderer.clearLog();
    this.renderer.log('选择角色：', 'info');

    const identities = [
      { id: 'coder', name: '前互联网大厂程序员', emoji: '💻', con: 35, int: 85, hrt: 30, art: 40, luk: 50, money: 25000, fans: { bilibili: 500, douyin: 0, xiaohongshu: 0 }, desc: '懂算法但体能堪忧，视频爆款率+30%。' },
      { id: 'tough', name: '民间狠活老铁', emoji: '🛠️', con: 90, int: 30, hrt: 80, art: 10, luk: 40, money: 500, fans: { bilibili: 0, douyin: 800, xiaohongshu: 0 }, desc: '体能爆表，黑红Sin减半，短视频流量翻倍。' },
    ];

    for (const idt of identities) {
      const card = document.createElement('div');
      card.className = 'identity-card';
      card.innerHTML = `
        <h3>${idt.emoji} ${idt.name}</h3>
        <div class="attrs">体力${idt.con} | 智力${idt.int} | 情商${idt.hrt} | 审美${idt.art} | 运气${idt.luk}</div>
        <div class="desc">${idt.desc}</div>
        <div style="margin-top:6px;font-size:12px;color:var(--muted)">资金：¥${idt.money}</div>
        <div style="margin-top:4px">
          ${Object.entries(idt.fans).filter(([_,v])=>v>0).map(([k,v])=>`<span class="platform-tag">${k === 'bilibili' ? 'B站' : k === 'douyin' ? '抖音' : '小红书'} ${v}</span>`).join('')}
        </div>
      `;
      card.onclick = () => this.selectIdentity(idt);
      this.renderer.els.log.appendChild(card);
    }

    this.renderer.showChoices([]);
  }

  selectIdentity(idt) {
    this.state.stats = { con: idt.con, int: idt.int, hrt: idt.hrt, art: idt.art, luk: idt.luk };
    this.state.cny = idt.money;
    this.state.fans = { ...idt.fans };
    this.state.energy = 80;
    this.state.maxEnergy = 100;

    // 初始化负重
    this.state.inventory = [];
    this.state.weight = 0;
    const starting = STARTING_ITEMS[idt.id] || [];
    for (const si of starting) {
      this.state.addItem(si.item, si.count);
    }

    this.renderer.showStats();
    this.renderer.updateStats(this.state);
    this.renderer.log(`你选择了【${idt.emoji} ${idt.name}】，准备从成都出发！`, 'success');
    this.renderer.log(`背包负重：${this.state.weight}/${this.state.maxWeight}kg`, 'info');

    this.phaseMorning();
  }

  // ---- 晨间阶段 ----
  phaseMorning() {
    this.state.phase = 'MORNING';
    this.state.time = 9;
    this.renderer.setPhase(`第${this.state.day}天 晨间整备`);
    this.renderer.clearLog();

    const node = this.state.currentNode;
    if (!node) {
      this.triggerEnding('arrived');
      return;
    }

    // 记录已访问的兴趣点
    this.state.visitedPois.add(node.id);

    // 节点到达事件
    if (this.state.km >= node.km && NODE_EVENTS[node.id]) {
      const evt = NODE_EVENTS[node.id];
      this.renderer.log(evt.text, 'info');
      for (const eff of evt.effects) {
        this.state.modifyStat(eff.key, eff.delta);
      }
    }

    this.renderer.log(`你在${node.name}。${node.desc}`, 'muted');

    // 根据节点类型显示不同交互
    if (node.type === 'city') {
      this.renderer.log(`这是一个城市，你可以补给、住宿、观光。`, 'info');
      this.renderer.showChoices([
        { text: '🏙️ 进入城市', className: 'primary', onClick: () => this.enterCity(node) },
        { text: '🚴 直接出发', onClick: () => this.phaseDay() },
      ]);
    } else if (node.type === 'wild_poi') {
      this.renderer.renderWildPoi(node, (action) => {
        if (action === 'shoot') {
          const attr = node.attractions[0];
          this.state.time += attr.time;
          for (const eff of attr.effects) {
            this.state.modifyStat(eff.key, eff.delta);
          }
          this.renderer.log(`你在${attr.name}拍摄了大量素材！`, 'success');
          this.renderer.updateStats(this.state);
          this.phaseDay();
        } else {
          this.phaseDay();
        }
      });
      return; // renderWildPoi 已处理 UI
    } else {
      this.renderer.log(`今日目标：推进到下一个兴趣点。`, 'info');
      this.renderer.showChoices([
        { text: '🚴 出发前进', className: 'primary', onClick: () => this.phaseDay() },
      ]);
    }

    this.renderer.updateStats(this.state);
    SaveSystem.save(this.state);
  }

  // ---- 白天阶段 ----
  phaseDay() {
    this.state.phase = 'DAY';
    this.renderer.setPhase('日间行进');

    // 选择赶路模式
    this.renderer.log('选择赶路模式：', 'info');
    this.renderer.showChoices([
      { text: `🚴 ${TRAVEL_MODES.normal.name}（速度${TRAVEL_MODES.normal.speed}km/h，消耗适中）`, onClick: () => this.doTravel('normal') },
      { text: `🏃 ${TRAVEL_MODES.rush.name}（速度${TRAVEL_MODES.rush.speed}km/h，消耗较大）`, className: 'danger', onClick: () => this.doTravel('rush') },
    ]);
  }

  doTravel(modeId) {
    const mode = TRAVEL_MODES[modeId];
    this.state.time += mode.time;
    this.state.km += mode.speed;
    this.state.energy -= mode.energyCost;
    this.state.stats.con -= mode.conCost;

    this.renderer.log(`你以【${mode.name}】推进了${mode.speed}km。`, 'info');

    // 检查到达节点
    const nextNode = ROUTE[this.state.nodeIndex + 1];
    if (nextNode && this.state.km >= nextNode.km) {
      this.state.nodeIndex++;
      this.state.visitedPois.add(nextNode.id);
      this.renderer.log(`到达${nextNode.name}！`, 'success');
      this.renderer.log(nextNode.desc, 'info');
      // 路过野外景点自动获得少量素材
      if (nextNode.type === 'wild_poi') {
        this.state.materials += 3;
        this.renderer.log(`路过${nextNode.name}，顺手拍了几张照片，素材+3。`, 'info');
      }
    }

    // 触发事件
    const evt = this.eventEngine.rollEvent('DAY');
    if (evt) {
      this.renderer.log(`事件：${evt.text}`, 'warn');
      const choices = evt.choices.map(c => ({
        text: c.text,
        onClick: () => {
          this.eventEngine.executeChoice(c, this.state);
          this.renderer.log(`你选择了：${c.text.split('（')[0]}`, 'success');
          this.checkStatus(() => this.phaseNoon());
        }
      }));
      this.renderer.showChoices(choices);
    } else {
      this.renderer.log('一路顺风。', 'muted');
      this.checkStatus(() => this.phaseNoon());
    }

    this.renderer.updateStats(this.state);
  }

  // ---- 中午选择 ----
  phaseNoon() {
    if (this.state.time >= 18) {
      this.phaseEvening();
      return;
    }

    this.renderer.setPhase('中午');
    this.renderer.log(`时间：${this.timeEngine.formatTime()}。你可以选择休息或继续赶路。`, 'info');

    this.renderer.showChoices([
      { text: '🍚 吃饭休息（精力+10，体力+8，时间+1h，资金-30）', onClick: () => {
        this.state.time += 1;
        this.state.energy += 10;
        this.state.stats.con = Math.min(100, this.state.stats.con + 8);
        this.state.cny -= 30;
        this.renderer.log('你吃了午饭，休息了一会儿，体力恢复了不少。', 'success');
        this.phaseAfternoon();
      }},
      { text: '😴 停下休息（精力+5，体力+5，时间+1.5h）', onClick: () => {
        this.state.time += 1.5;
        this.state.energy += 5;
        this.state.stats.con = Math.min(100, this.state.stats.con + 5);
        this.renderer.log('你在路边找了块平地躺下休息，体力恢复了一些。', 'success');
        this.phaseAfternoon();
      }},
      { text: '🚴 继续赶路（跳过休息）', className: 'primary', onClick: () => this.phaseAfternoon() },
    ]);

    this.renderer.updateStats(this.state);
  }

  // ---- 下午 ----
  phaseAfternoon() {
    if (this.state.time >= 18) {
      this.phaseEvening();
      return;
    }

    this.renderer.log('下午继续赶路...', 'info');
    this.renderer.showChoices([
      { text: `🚴 ${TRAVEL_MODES.normal.name}`, onClick: () => this.doAfternoonTravel('normal') },
      { text: `🏃 ${TRAVEL_MODES.rush.name}`, className: 'danger', onClick: () => this.doAfternoonTravel('rush') },
    ]);
  }

  doAfternoonTravel(modeId) {
    const mode = TRAVEL_MODES[modeId];
    this.state.time += mode.time;
    this.state.km += mode.speed;
    this.state.energy -= mode.energyCost;
    this.state.stats.con -= mode.conCost;

    this.renderer.log(`下午以【${mode.name}】推进了${mode.speed}km。`, 'info');

    // 检查到达
    const nextNode = ROUTE[this.state.nodeIndex + 1];
    if (nextNode && this.state.km >= nextNode.km) {
      this.state.nodeIndex++;
      this.state.visitedPois.add(nextNode.id);
      this.renderer.log(`到达${nextNode.name}！`, 'success');
      if (nextNode.type === 'wild_poi') {
        this.state.materials += 3;
        this.renderer.log(`路过${nextNode.name}，顺手拍了几张照片，素材+3。`, 'info');
      }
    }

    this.checkStatus(() => this.phaseEvening());
    this.renderer.updateStats(this.state);
  }

  // ---- 傍晚 ----
  phaseEvening() {
    this.state.phase = 'EVENING';
    this.renderer.setPhase('傍晚');
    this.renderer.log(`时间：${this.timeEngine.formatTime()}。天色渐暗。`, 'muted');

    const currentNode = this.state.currentNode;
    const isCity = currentNode && currentNode.type === 'city';

    if (isCity) {
      this.renderer.log(`你现在在${currentNode.name}，可以选择在城市过夜。`, 'info');
      this.renderer.showChoices([
        { text: '🏨 进入城市过夜（住宿/补给）', className: 'primary', onClick: () => this.enterCity(currentNode, true) },
        { text: '⛺ 在城市边缘露营（省钱但恢复差）', onClick: () => {
          this.state.accommodationChoice = 'camp';
          this.renderer.log('你决定在城市边缘找个角落露营。', 'muted');
          this.phaseNight();
        }},
        { text: '🌙 继续赶路', onClick: () => {
          this.state.time += 2;
          this.state.km += 10;
          this.state.energy -= 20;
          this.state.stats.con -= 10;
          this.renderer.log('你摸黑赶路，效率很低...', 'warn');
          this.checkStatus(() => this.phaseNight());
        }},
      ]);
    } else {
      this.renderer.log('附近没有城市，你只能在野外扎营。', 'warn');
      this.renderer.showChoices([
        { text: '⛺ 野外扎营（恢复-40%，可能有突发事件）', onClick: () => {
          this.state.accommodationChoice = 'camp';
          this.renderer.log('你在荒野中搭起帐篷，四周一片寂静...', 'muted');
          this.phaseNight();
        }},
        { text: '🌙 继续赶路', onClick: () => {
          this.state.time += 2;
          this.state.km += 10;
          this.state.energy -= 20;
          this.state.stats.con -= 10;
          this.renderer.log('你摸黑赶路，效率很低...', 'warn');
          this.checkStatus(() => this.phaseNight());
        }},
      ]);
    }

    this.renderer.updateStats(this.state);
  }

  // ---- 夜间内容产出（自由组合） ----
  phaseNight() {
    this.state.phase = 'NIGHT';
    this.renderer.setPhase('夜间内容产出（自由组合）');
    this.renderer.clearLog();
    this.renderer.log('夜幕降临，你可以选择多种内容形式组合产出。', 'info');
    this.renderer.log(`当前素材积累：${this.state.materials} | 剩余时间：${24 - this.state.time}h | 精力：${Math.round(this.state.energy)}`, 'muted');

    // 显示可选内容
    const selected = [];
    const refreshChoices = () => {
      const remainingTime = 24 - this.state.time;
      const remainingEnergy = this.state.energy;

      const buttons = Object.entries(CONTENT_TYPES).map(([id, config]) => {
        const canAfford = remainingEnergy >= config.energy && remainingTime >= config.time;
        const isSelected = selected.includes(id);
        return {
          text: `${isSelected ? '✅ ' : ''}${config.name} 时间${config.time}h 精力${config.energy} | 依赖${config.stat.toUpperCase()}`,
          disabled: !canAfford && !isSelected,
          className: isSelected ? 'primary' : '',
          onClick: () => {
            if (isSelected) {
              selected.splice(selected.indexOf(id), 1);
            } else {
              selected.push(id);
            }
            refreshChoices();
          }
        };
      });

      buttons.push({
        text: selected.length > 0 ? `🚀 发布组合（${selected.length}项）` : '💤 直接睡觉（不产出）',
        className: selected.length > 0 ? 'primary' : '',
        onClick: () => {
          if (selected.length > 0) {
            this.doContentCombo(selected);
          } else {
            this.phaseSettle();
          }
        }
      });

      this.renderer.showChoices(buttons);
    };

    refreshChoices();
    this.renderer.updateStats(this.state);
  }

  doContentCombo(types) {
    const result = ContentSystem.produceCombo(this.state, types);

    this.renderer.log(`你发布了${types.length}项内容组合！`, 'success');
    this.renderer.log(`粉丝增长：B站+${result.gains.bilibili} 抖音+${result.gains.douyin} 小红书+${result.gains.xiaohongshu}`, 'info');

    // 应用粉丝增长
    for (const [platform, amount] of Object.entries(result.gains)) {
      this.state.fans[platform] += amount;
    }

    // 打赏收入
    const totalGain = result.gains.bilibili + result.gains.douyin + result.gains.xiaohongshu;
    const reward = Math.floor(totalGain * 0.2);
    this.state.cny += reward;
    this.renderer.log(`打赏收入：¥${reward}`, 'success');

    // 检查变现解锁
    const monetizationEvents = PlatformAlgorithm.checkMonetizationEvents(this.state);
    for (const evt of monetizationEvents) {
      this.renderer.log(`🎉 ${evt.name}！${evt.desc}`, 'success');
      this.state.flags.add(`${evt.platform}_partner`);
    }

    this.phaseSettle();
  }

  // ---- 夜间结算 ----
  phaseSettle() {
    this.state.phase = 'SETTLE';
    this.renderer.setPhase('夜间结算');

    // 住宿类型判断
    const acc = this.state.accommodationChoice;
    const isCamp = !acc || acc === 'camp';

    // 食宿消耗
    let foodCost = 50;
    if (acc && acc !== 'camp') {
      const node = this.state.currentNode;
      const hotel = node && node.accommodations ? node.accommodations.find(a => a.id === acc) : null;
      if (hotel) {
        foodCost += hotel.price;
        this.renderer.log(`🏨 住宿 ${hotel.name}：¥${hotel.price}`, 'info');
      }
    } else {
      this.renderer.log(`⛺ 野外扎营，无住宿费用`, 'muted');
    }
    this.state.cny -= foodCost;
    this.renderer.log(`每日食宿消耗：¥${foodCost}`, 'muted');

    // 精力恢复（加入住宿系数）
    let energyMult = 1.0;
    let conMult = 1.0;
    let sanBonus = 0;

    if (acc && acc !== 'camp') {
      const node = this.state.currentNode;
      const hotel = node && node.accommodations ? node.accommodations.find(a => a.id === acc) : null;
      if (hotel) {
        energyMult = hotel.energyMult;
        conMult = hotel.conMult;
        sanBonus = hotel.sanBonus;
      }
    } else {
      energyMult = 0.75;
      conMult = 0.75;
    }

    const baseRecovery = 22 + this.state.stats.con * 0.32;
    const energyRecovery = Math.floor(baseRecovery * energyMult);
    this.state.energy = Math.min(this.state.maxEnergy, this.state.energy + energyRecovery);
    this.renderer.log(`睡眠恢复精力：+${energyRecovery}${isCamp ? '（野外露营恢复一般）' : ''}`, 'success');

    // 体力恢复
    const currentNode = this.state.currentNode;
    const altitude = currentNode && currentNode.km > 400 ? 0.6 : 1.0;
    const baseConRecovery = Math.max(3, Math.floor((5 + this.state.stats.con * 0.08) * altitude));
    const conRecovery = Math.floor(baseConRecovery * conMult);
    this.state.stats.con = Math.min(100, this.state.stats.con + conRecovery);
    this.renderer.log(`睡眠恢复体力：+${conRecovery}${altitude < 1 ? '（高海拔恢复减缓）' : ''}${isCamp ? '（野外露营恢复一般）' : ''}`, 'success');

    // 精神恢复（住宿奖励）
    if (sanBonus > 0) {
      this.state.san = Math.min(100, this.state.san + sanBonus);
      this.renderer.log(`住宿环境舒适，精神恢复：+${sanBonus}`, 'success');
    }

    // 超载惩罚
    const overload = this.state.checkOverload();
    if (overload.overloaded) {
      this.renderer.log(`⚠️ 背包超载！体力额外-${overload.penalty}`, 'danger');
    }

    // 素材清空
    this.state.materials = 0;

    // 野外露营事件
    if (isCamp) {
      const campEvent = rollCampEvent();
      if (campEvent) {
        this.renderer.log(`---`, 'muted');
        this.renderer.log(`${campEvent.text}`, 'warn');
        for (const eff of campEvent.effects) {
          this.state.modifyStat(eff.key, eff.delta);
        }
      }
    }

    this.renderer.log(`第${this.state.day}天结束。`, 'info');

    // 重置住宿选择
    this.state.accommodationChoice = null;

    // 检查结局
    if (this.checkEnding()) return;

    this.renderer.showChoices([
      { text: '➡️ 进入下一天', className: 'primary', onClick: () => {
        this.state.day++;
        this.state.time = 9;
        this.phaseMorning();
      }}
    ]);

    this.renderer.updateStats(this.state);
    SaveSystem.save(this.state);
  }

  // ---- 状态检查 ----
  checkStatus(next) {
    // Sin弱信号提示
    const sinDesc = SinSystem.getSinDescription(this.state.sin);
    if (sinDesc && !this.state.flags.has('sin_warned_' + Math.floor(this.state.sin / 10))) {
      this.state.flags.add('sin_warned_' + Math.floor(this.state.sin / 10));
      this.renderer.log(sinDesc.text, sinDesc.level);
    }

    if (this.state.stats.con <= 0) {
      this.triggerEnding('dead');
      return;
    }
    if (this.state.san <= 0) {
      this.triggerEnding('insane');
      return;
    }
    if (this.state.cny <= 0 && this.state.totalFans < 1000) {
      this.triggerEnding('broke');
      return;
    }
    // Sin过高提前检查
    if (this.state.sin >= 80) {
      this.triggerEnding('blackred');
      return;
    }
    next();
  }

  // ---- 结局检查 ----
  checkEnding() {
    // 死亡结局
    if (this.state.stats.con <= 0) { this.triggerEnding('dead'); return true; }
    // 精神崩溃
    if (this.state.san <= 0) { this.triggerEnding('insane'); return true; }
    // 破产
    if (this.state.cny <= 0 && this.state.totalFans < 1000) { this.triggerEnding('broke'); return true; }
    // 黑红之王（Sin过高）
    const sinEnding = SinSystem.checkSinEnding(this.state);
    if (sinEnding) { this.triggerEnding(sinEnding); return true; }
    // 抵达终点
    if (this.state.nodeIndex >= ROUTE.length - 1) {
      // 检查是否达成好结局
      const totalFans = this.state.totalFans;
      const sin = this.state.sin;
      if (totalFans > 100000 && sin < 20) {
        this.triggerEnding('famous');
      } else if (sin >= 50) {
        this.triggerEnding('blackred');
      } else {
        this.triggerEnding('arrived');
      }
      return true;
    }
    return false;
  }

  triggerEnding(id) {
    this.state.gameOver = true;
    this.state.ending = id;
    const ending = ENDINGS[id];
    this.renderer.showEnding(ending);
    SaveSystem.clear();
  }

  // ---- 兴趣点系统方法 ----
  toggleMap() {
    this.renderer.toggleMap();
  }

  enterCity(node, isEvening = false) {
    this.renderer.renderCityMenu(node, (action) => {
      if (action === 'leave') {
        if (isEvening) {
          this.phaseNight();
        } else {
          this.phaseDay();
        }
      }
    });
  }

  switchCityTab(tab) {
    this._cityMenuTab = tab;
    if (this._cityMenuRefresh) {
      this._cityMenuRefresh();
    }
  }

  buyItem(itemId) {
    const node = this._currentCityNode;
    const item = node.shop.items.find(i => i.id === itemId);
    if (!item) return;
    if (this.state.cny < item.price) {
      this.renderer.log('资金不足！', 'warn');
      return;
    }
    const newWeight = this.state.weight + item.weight;
    if (newWeight > this.state.maxWeight * 1.5) {
      this.renderer.log('背包超重，无法携带！', 'warn');
      return;
    }
    this.state.cny -= item.price;
    this.state.addItem(itemId, 1);
    this.renderer.log(`购买成功：${item.name} (-¥${item.price})`, 'success');
    this.renderer.updateStats(this.state);
    // 刷新城市菜单，保持在商店标签
    this._cityMenuTab = '商店';
    this.renderer.renderCityMenu(node, (action) => {
      if (action === 'leave') this.phaseDay();
    });
  }

  selectAccommodation(accId) {
    const node = this._currentCityNode;
    const acc = node.accommodations.find(a => a.id === accId);
    if (!acc) return;
    if (this.state.cny < acc.price) {
      this.renderer.log('资金不足！', 'warn');
      return;
    }
    this.state.accommodationChoice = accId;
    this.renderer.log(`已预订 ${acc.name}，今晚将在这里休息。`, 'success');
    // 如果是傍晚进入城市，直接进入夜间
    if (this.state.phase === 'EVENING') {
      this.phaseNight();
    } else {
      // 白天进入城市，选择完住宿后可以继续观光或离开
      this._cityMenuTab = '商店';
      this.renderer.renderCityMenu(node, (action) => {
        if (action === 'leave') this.phaseDay();
      });
    }
  }

  visitAttraction(attrName) {
    const node = this._currentCityNode;
    const attr = node.attractions.find(a => a.name === attrName);
    if (!attr) return;
    if (24 - this.state.time < attr.time) {
      this.renderer.log('时间不够了！', 'warn');
      return;
    }
    this.state.time += attr.time;
    for (const eff of attr.effects) {
      this.state.modifyStat(eff.key, eff.delta);
    }
    this.renderer.log(`你参观了${attr.name}：${attr.desc}`, 'success');
    this.renderer.updateStats(this.state);
    // 刷新城市菜单，保持在景点标签
    this._cityMenuTab = '景点';
    this.renderer.renderCityMenu(node, (action) => {
      if (action === 'leave') this.phaseDay();
    });
  }
}

// ===================== 启动 =====================
const game = new Game();
game.showStartScreen();
</script>
